# ─────────────────────────────────────────────────────────────────────────────
# Shutter automation package
#
# Place this file in your HA config directory under packages/shutters.yaml.
# In configuration.yaml add:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# Prerequisites:
#   - OpenWeatherMap integration named "owm" (entity: weather.owm)
#   - Workday binary sensor set up for Hungary (via this file or UI integration)
#   - Cover entities created via Pico MQTT Discovery
#   - Cover groups created via UI — entity IDs must match the CONFIGURE comments:
#       cover.shutters_workday_morning
#       cover.shutters_weekend_morning
#       cover.shutters_evening
#       cover.shutters_evening_delayed
#       cover.shutters_night_ventilation
# ─────────────────────────────────────────────────────────────────────────────


# ── Helpers ───────────────────────────────────────────────────────────────────

input_datetime:
  workday_morning_earliest:
    name: "Workday morning — earliest open time"
    has_time: true
    has_date: false
    initial: "06:30:00"
    icon: mdi:weather-sunrise

  weekend_morning_time:
    name: "Weekend morning — open time"
    has_time: true
    has_date: false
    initial: "08:10:00"
    icon: mdi:alarm-snooze

input_number:
  shutter_temp_full_open:
    name: "Shutter — temperature for full open"
    min: 10
    max: 35
    step: 0.5
    initial: 25
    unit_of_measurement: "°C"
    icon: mdi:thermometer
    mode: box

  shutter_temp_min_open:
    name: "Shutter — temperature for minimum open"
    min: 15
    max: 45
    step: 0.5
    initial: 35
    unit_of_measurement: "°C"
    icon: mdi:thermometer-high
    mode: box

  shutter_min_position:
    name: "Shutter — minimum open position"
    min: 0
    max: 100
    step: 5
    initial: 35
    unit_of_measurement: "%"
    icon: mdi:window-shutter
    mode: box

  evening_delayed_offset_min:
    name: "Evening delayed close — offset after sunset"
    min: 0
    max: 120
    step: 5
    initial: 20
    unit_of_measurement: "min"
    icon: mdi:weather-sunset-down
    mode: box

  night_vent_offset_min:
    name: "Night ventilation — offset after sunset"
    min: 0
    max: 180
    step: 5
    initial: 45
    unit_of_measurement: "min"
    icon: mdi:weather-night
    mode: box

  night_vent_temp_threshold:
    name: "Night ventilation — minimum temperature threshold"
    min: 15
    max: 30
    step: 0.5
    initial: 22
    unit_of_measurement: "°C"
    icon: mdi:thermometer-low
    mode: box

  night_vent_position:
    name: "Night ventilation — open position"
    min: 0
    max: 100
    step: 5
    initial: 55
    unit_of_measurement: "%"
    icon: mdi:window-shutter-open
    mode: box


# ── Workday sensor (Hungary) ──────────────────────────────────────────────────
# Creates binary_sensor.workday_hu — ON on working days, OFF on weekends and
# Hungarian public holidays. If this fails in newer HA versions, set up the
# Workday integration via UI instead (Settings → Integrations → Workday).

binary_sensor:
  - platform: workday
    country: HU
    name: "Workday HU"


# ── Automations ───────────────────────────────────────────────────────────────

automation:

  # ── 1. Workday morning open ───────────────────────────────────────────────
  # Opens at MAX(sunrise, workday_morning_earliest) on working days.
  # Two triggers with cross-conditions ensure exactly one fires:
  #   - time trigger fires at 06:30 → sun condition passes only if sunrise already passed
  #   - sunrise trigger fires at sunrise → time condition passes only if it's past 06:30
  #
  # Position formula (linear between thresholds, clamped):
  #   tempmax <= temp_full_open  →  100%
  #   tempmax >= temp_min_open   →  shutter_min_position %
  #   in between                 →  linear

  - id: shutters_workday_morning
    alias: "Shutters: workday morning open"
    trigger:
      - platform: time
        at: input_datetime.workday_morning_earliest
      - platform: sun
        event: sunrise
    condition:
      - condition: state
        entity_id: binary_sensor.workday_hu
        state: "on"
      - condition: template
        value_template: >-
          {{ now() >= today_at(states('input_datetime.workday_morning_earliest')) }}
      - condition: sun
        after: sunrise
    action:
      - action: weather.get_forecast
        target:
          entity_id: weather.owm
        data:
          type: daily
        response_variable: forecast

      - variables:
          tempmax: "{{ forecast.forecast[0].temperature | float(20) }}"
          temp_low: "{{ states('input_number.shutter_temp_full_open') | float(25) }}"
          temp_high: "{{ states('input_number.shutter_temp_min_open') | float(35) }}"
          pos_min: "{{ states('input_number.shutter_min_position') | float(35) }}"
          position: >-
            {{ [[100 - (tempmax - temp_low) / (temp_high - temp_low) * (100 - pos_min),
                 pos_min] | max, 100] | min | round | int }}

      - action: cover.set_cover_position
        target:
          entity_id: cover.shutters_workday_morning   # CONFIGURE: match your group entity ID
        data:
          position: "{{ position }}"


  # ── 2. Weekend morning open ───────────────────────────────────────────────
  # Opens at the configured time on weekends and Hungarian public holidays.
  # Same position formula as workday morning.

  - id: shutters_weekend_morning
    alias: "Shutters: weekend morning open"
    trigger:
      - platform: time
        at: input_datetime.weekend_morning_time
    condition:
      - condition: state
        entity_id: binary_sensor.workday_hu
        state: "off"
    action:
      - action: weather.get_forecast
        target:
          entity_id: weather.owm
        data:
          type: daily
        response_variable: forecast

      - variables:
          tempmax: "{{ forecast.forecast[0].temperature | float(20) }}"
          temp_low: "{{ states('input_number.shutter_temp_full_open') | float(25) }}"
          temp_high: "{{ states('input_number.shutter_temp_min_open') | float(35) }}"
          pos_min: "{{ states('input_number.shutter_min_position') | float(35) }}"
          position: >-
            {{ [[100 - (tempmax - temp_low) / (temp_high - temp_low) * (100 - pos_min),
                 pos_min] | max, 100] | min | round | int }}

      - action: cover.set_cover_position
        target:
          entity_id: cover.shutters_weekend_morning   # CONFIGURE: match your group entity ID
        data:
          position: "{{ position }}"


  # ── 3. Evening close ──────────────────────────────────────────────────────
  # Closes shutters at sunset.

  - id: shutters_evening_close
    alias: "Shutters: evening close"
    trigger:
      - platform: sun
        event: sunset
    action:
      - action: cover.set_cover_position
        target:
          entity_id: cover.shutters_evening   # CONFIGURE
        data:
          position: 0


  # ── 4. Evening close — delayed ────────────────────────────────────────────
  # Closes shutters at sunset + configurable offset (default 20 min).

  - id: shutters_evening_close_delayed
    alias: "Shutters: evening close (delayed)"
    trigger:
      - platform: sun
        event: sunset
    action:
      - delay:
          minutes: "{{ states('input_number.evening_delayed_offset_min') | int(20) }}"

      - action: cover.set_cover_position
        target:
          entity_id: cover.shutters_evening_delayed   # CONFIGURE
        data:
          position: 0


  # ── 5. Night ventilation ──────────────────────────────────────────────────
  # At sunset, fetches tonight's forecast low. If it exceeds the threshold,
  # waits the configured offset then opens shutters to the configured position.

  - id: shutters_night_ventilation
    alias: "Shutters: night ventilation"
    trigger:
      - platform: sun
        event: sunset
    action:
      - action: weather.get_forecast
        target:
          entity_id: weather.owm
        data:
          type: daily
        response_variable: forecast

      - condition: template
        value_template: >-
          {{ forecast.forecast[0].templow | float(0)
             > states('input_number.night_vent_temp_threshold') | float(22) }}

      - delay:
          minutes: "{{ states('input_number.night_vent_offset_min') | int(45) }}"

      - action: cover.set_cover_position
        target:
          entity_id: cover.shutters_night_ventilation   # CONFIGURE
        data:
          position: "{{ states('input_number.night_vent_position') | int(55) }}"
