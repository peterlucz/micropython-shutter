# ─────────────────────────────────────────────────────────────────────────────
# Shutter automation package
#
# Place this file in your HA config directory under packages/shutters.yaml.
# In configuration.yaml add:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# Prerequisites:
#   - Met.no integration (entity: weather.forecast_home)
#   - Workday binary sensor set up for Hungary (binary_sensor.workday_sensor)
#   - Cover entities created via Pico MQTT Discovery
#   - Cover groups created via UI — entity IDs must match the CONFIGURE comments:
#       cover.shutters_workday_morning
#       cover.shutters_weekend_morning
#       cover.shutters_evening
#       cover.shutters_evening_delayed
#       cover.shutters_night_ventilation
# ─────────────────────────────────────────────────────────────────────────────


# ── Helpers ───────────────────────────────────────────────────────────────────

input_datetime:
  workday_morning_earliest:
    name: "Workday morning — earliest open time"
    has_time: true
    has_date: false
    initial: "06:30:00"
    icon: mdi:weather-sunrise

  weekend_morning_time:
    name: "Weekend morning — open time"
    has_time: true
    has_date: false
    initial: "08:10:00"
    icon: mdi:alarm-snooze

  # Written by the automations below at sunset — not tuning knobs. They hold
  # the computed action datetimes so the schedule survives HA restarts and
  # automation.reload (a plain delay: step would be silently cancelled).
  evening_delayed_close_at:
    name: "Evening delayed close — scheduled for"
    has_date: true
    has_time: true
    icon: mdi:clock-end

  night_vent_open_at:
    name: "Night ventilation — scheduled for"
    has_date: true
    has_time: true
    icon: mdi:clock-start

input_number:
  shutter_temp_full_open:
    name: "Shutter — temperature for full open"
    min: 10
    max: 35
    step: 0.5
    initial: 25
    unit_of_measurement: "°C"
    icon: mdi:thermometer
    mode: box

  shutter_temp_min_open:
    name: "Shutter — temperature for minimum open"
    min: 15
    max: 45
    step: 0.5
    initial: 35
    unit_of_measurement: "°C"
    icon: mdi:thermometer-high
    mode: box

  shutter_min_position:
    name: "Shutter — minimum open position"
    min: 0
    max: 100
    step: 5
    initial: 35
    unit_of_measurement: "%"
    icon: mdi:window-shutter
    mode: box

  evening_delayed_offset_min:
    name: "Evening delayed close — offset after sunset"
    min: 0
    max: 120
    step: 5
    initial: 20
    unit_of_measurement: "min"
    icon: mdi:weather-sunset-down
    mode: box

  night_vent_offset_min:
    name: "Night ventilation — offset after sunset"
    min: 0
    max: 180
    step: 5
    initial: 45
    unit_of_measurement: "min"
    icon: mdi:weather-night
    mode: box

  night_vent_temp_threshold:
    name: "Night ventilation — minimum temperature threshold"
    min: 15
    max: 30
    step: 0.5
    initial: 22
    unit_of_measurement: "°C"
    icon: mdi:thermometer-low
    mode: box

  night_vent_position:
    name: "Night ventilation — open position"
    min: 0
    max: 100
    step: 5
    initial: 55
    unit_of_measurement: "%"
    icon: mdi:window-shutter-open
    mode: box

  # Populated by the "update daily forecast temperatures" automation below —
  # not tuning knobs. No `initial:` so a stale value never masks a failed update.
  today_temp_max:
    name: "Today — forecast max temperature"
    min: -30
    max: 50
    step: 0.1
    unit_of_measurement: "°C"
    icon: mdi:thermometer-high
    mode: box

  tonight_temp_min:
    name: "Tonight — forecast min temperature (coming night)"
    min: -30
    max: 50
    step: 0.1
    unit_of_measurement: "°C"
    icon: mdi:thermometer-low
    mode: box



# ── Template sensors ──────────────────────────────────────────────────────────

# Single source of truth for the morning open position, used by automations
# 1 and 2. Recomputes whenever a helper changes, so it can be watched and
# tuned live on a dashboard.
#
#   tempmax <= temp_full_open  →  100%
#   tempmax >= temp_min_open   →  shutter_min_position %
#   in between                 →  linear
#
# `span` is floored at 0.1 °C so equal thresholds degrade to a step function
# instead of dividing by zero.
#
# NOTE: deploy_ha.py cannot push `template:` sections (config-entry entities);
# until it learns the config-flow API this section only works via a file-based
# package deploy.

template:
  - sensor:
      - name: "Shutter open level"
        unique_id: shutter_open_level
        unit_of_measurement: "%"
        icon: mdi:window-shutter-settings
        state: >-
          {% set tempmax   = states('input_number.today_temp_max') | float(20) %}
          {% set temp_low  = states('input_number.shutter_temp_full_open') | float(25) %}
          {% set temp_high = states('input_number.shutter_temp_min_open') | float(35) %}
          {% set pos_min   = states('input_number.shutter_min_position') | float(35) %}
          {% set span = [temp_high - temp_low, 0.1] | max %}
          {{ [[100 - (tempmax - temp_low) / span * (100 - pos_min),
               pos_min] | max, 100] | min | round | int }}


# ── Automations ───────────────────────────────────────────────────────────────

automation:

  # ── 1. Workday morning open ───────────────────────────────────────────────
  # Opens at MAX(sunrise, workday_morning_earliest) on working days.
  # Two triggers with cross-conditions ensure exactly one fires:
  #   - time trigger fires at 06:30 → sun condition passes only if sunrise already passed
  #   - sunrise trigger fires at sunrise → time condition passes only if it's past 06:30
  #
  # Open position comes from sensor.shutter_open_level (template sensor above).

  - id: shutters_workday_morning
    alias: "Shutters: workday morning open"
    trigger:
      - platform: time
        at: input_datetime.workday_morning_earliest
      - platform: sun
        event: sunrise
    condition:
      - condition: state
        entity_id: binary_sensor.workday_sensor
        state: "on"
      - condition: template
        value_template: >-
          {{ now() >= today_at(states('input_datetime.workday_morning_earliest')) }}
      - condition: sun
        after: sunrise
    action:
      - action: cover.set_cover_position
        target:
          entity_id: cover.shutters_workday_morning   # CONFIGURE: match your group entity ID
        data:
          position: "{{ states('sensor.shutter_open_level') | float(100) | int }}"


  # ── 2. Weekend morning open ───────────────────────────────────────────────
  # Opens at the configured time on weekends and Hungarian public holidays.
  # Open position comes from sensor.shutter_open_level (template sensor above).

  - id: shutters_weekend_morning
    alias: "Shutters: weekend morning open"
    trigger:
      - platform: time
        at: input_datetime.weekend_morning_time
    condition:
      - condition: state
        entity_id: binary_sensor.workday_sensor
        state: "off"
    action:
      - action: cover.set_cover_position
        target:
          entity_id: cover.shutters_weekend_morning   # CONFIGURE: match your group entity ID
        data:
          position: "{{ states('sensor.shutter_open_level') | float(100) | int }}"


  # ── 3. Evening close ──────────────────────────────────────────────────────
  # Closes shutters at sunset.

  - id: shutters_evening_close
    alias: "Shutters: evening close"
    trigger:
      - platform: sun
        event: sunset
    action:
      - action: cover.set_cover_position
        target:
          entity_id: cover.shutters_evening   # CONFIGURE
        data:
          position: 0


  # ── 4. Evening close — delayed ────────────────────────────────────────────
  # Closes shutters at sunset + configurable offset (default 20 min).
  # Two triggers instead of a delay: sunset writes the target datetime into a
  # helper, and a time trigger fires on it. A delay: step would be cancelled
  # by automation.reload (deploy_ha.py runs it after every deploy) or an HA
  # restart; the time trigger is re-registered from the helper and survives.

  - id: shutters_evening_close_delayed
    alias: "Shutters: evening close (delayed)"
    trigger:
      - platform: sun
        event: sunset
        id: schedule
      - platform: time
        at: input_datetime.evening_delayed_close_at
        id: close
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: schedule
            sequence:
              - action: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.evening_delayed_close_at
                data:
                  datetime: >-
                    {{ (now() + timedelta(minutes =
                        states('input_number.evening_delayed_offset_min') | float(20) | int))
                       .strftime('%Y-%m-%d %H:%M:%S') }}

          - conditions:
              - condition: trigger
                id: close
            sequence:
              - action: cover.set_cover_position
                target:
                  entity_id: cover.shutters_evening_delayed   # CONFIGURE
                data:
                  position: 0


  # ── 5. Night ventilation ──────────────────────────────────────────────────
  # At sunset, if tonight's forecast low exceeds the threshold, schedules the
  # vent open at sunset + offset via a datetime helper (same restart-safe
  # pattern as #4). On cool nights the helper keeps its past value, so the
  # time trigger simply never fires.

  - id: shutters_night_ventilation
    alias: "Shutters: night ventilation"
    trigger:
      - platform: sun
        event: sunset
        id: schedule
      - platform: time
        at: input_datetime.night_vent_open_at
        id: open
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: schedule
              - condition: template
                value_template: >-
                  {{ states('input_number.tonight_temp_min') | float(0)
                     > states('input_number.night_vent_temp_threshold') | float(22) }}
            sequence:
              - action: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.night_vent_open_at
                data:
                  datetime: >-
                    {{ (now() + timedelta(minutes =
                        states('input_number.night_vent_offset_min') | float(45) | int))
                       .strftime('%Y-%m-%d %H:%M:%S') }}

          - conditions:
              - condition: trigger
                id: open
            sequence:
              - action: cover.set_cover_position
                target:
                  entity_id: cover.shutters_night_ventilation   # CONFIGURE
                data:
                  position: "{{ states('input_number.night_vent_position') | float(55) | int }}"


  # ── 6. Update daily forecast temperatures ─────────────────────────────────
  # Writes today's forecast daytime high into today_temp_max (from the daily
  # forecast) and the COMING night's low into tonight_temp_min (minimum of the
  # hourly forecast over the next 18 h, so it's always the upcoming night rather
  # than a low that already passed this morning). Runs at HA start and hourly.

  - id: shutters_update_daily_temps
    alias: "Shutters: update daily forecast temperatures"
    trigger:
      - platform: homeassistant
        event: start
      - platform: time_pattern
        hours: "/1"
    action:
      - action: weather.get_forecasts
        target:
          entity_id: weather.forecast_home
        data:
          type: daily
        response_variable: daily

      - action: weather.get_forecasts
        target:
          entity_id: weather.forecast_home
        data:
          type: hourly
        response_variable: hourly

      # Skip if either forecast is empty (e.g. right after restart)
      - condition: template
        value_template: >-
          {{ daily['weather.forecast_home'].forecast | count > 0
             and hourly['weather.forecast_home'].forecast | count > 0 }}

      - action: input_number.set_value
        target:
          entity_id: input_number.today_temp_max
        data:
          value: "{{ daily['weather.forecast_home'].forecast[0].temperature | float }}"

      - action: input_number.set_value
        target:
          entity_id: input_number.tonight_temp_min
        data:
          value: >-
            {% set ns = namespace(low = none) %}
            {% set cutoff = as_timestamp(now()) + 18 * 3600 %}
            {% for f in hourly['weather.forecast_home'].forecast %}
              {% if as_timestamp(f.datetime) <= cutoff %}
                {% set ns.low = f.temperature if ns.low is none
                                else [ns.low, f.temperature] | min %}
              {% endif %}
            {% endfor %}
            {{ (ns.low | float) | round(1) }}
